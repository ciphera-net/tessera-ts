name: tessera-ts

on:
  push:
    branches: [main]
  pull_request:

# ---------------------------------------------------------------------------
# WORKSPACE LAYOUT
#
# Every job that needs cross-repo path/replace deps checks out all required
# repos as SIBLINGS under $GITHUB_WORKSPACE so relative paths resolve:
#
#   $GITHUB_WORKSPACE/
#     tessera-ts/          ← this repo
#     ciphera-tessera/     ← ciphera-net/tessera (public Rust core)
#     tessera-go/          ← ciphera-net/tessera-go (public Go SDK)
#
# Path arithmetic:
#   tessera-ts/crates/tessera-wasm/Cargo.toml
#     ciphera-tessera = { path = "../../../ciphera-tessera" }
#     → from tessera-ts/crates/tessera-wasm/ go up 3 → $GITHUB_WORKSPACE/ciphera-tessera  ✓
#
#   tessera-ts/harness/{vault,blindindex}-parity/go.mod
#     replace github.com/ciphera-net/tessera-go => ../../../tessera-go
#     → from tessera-ts/harness/<parity-dir>/ go up 3 → $GITHUB_WORKSPACE/tessera-go      ✓
#   (Cross-language test VECTORS now live in ciphera-tessera/conformance/vectors; the Go generator
#    moved to tessera-go/harness/vectors — neither is under tessera-ts/harness anymore.)
#
# Both ciphera-net/tessera and ciphera-net/tessera-go are PUBLIC repos — no
# token is required for checkout. GITHUB_TOKEN implicit read access is sufficient.
# ---------------------------------------------------------------------------

jobs:
  # =========================================================================
  # JOB 1 — rust
  # Lint and build the WASM crate (no sidecar, no Node). Fast gate on Rust
  # hygiene before running the heavier integration jobs.
  # =========================================================================
  rust:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tessera-ts
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          path: tessera-ts

      # Public Rust core needed for the path dep in Cargo.toml
      - name: Checkout ciphera-tessera (public)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: ciphera-net/tessera
          path: ciphera-tessera

      - name: Install Rust stable + wasm32 target
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      # Cache: scope the cache to the workspace member that actually has a
      # Cargo.lock (tessera-ts workspace root = tessera-ts/Cargo.toml).
      - name: Restore Cargo cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: tessera-ts

      - name: cargo fmt --check
        working-directory: tessera-ts
        run: cargo fmt --check

      - name: cargo clippy (wasm32)
        working-directory: tessera-ts
        run: cargo clippy --target wasm32-unknown-unknown -- -D warnings

      - name: cargo build (wasm32)
        working-directory: tessera-ts
        run: cargo build --target wasm32-unknown-unknown

  # =========================================================================
  # JOB 2 — handshake-gate   (needs: rust)
  # Builds the sidecar + WASM pack outputs, then runs the node:test handshake
  # harness. This is the explicit gate: if the round-trip register→login
  # over the IPC channel is broken, ts-tests never starts.
  # =========================================================================
  handshake-gate:
    needs: [rust]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tessera-ts
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          path: tessera-ts

      - name: Checkout ciphera-tessera (public)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: ciphera-net/tessera
          path: ciphera-tessera

      - name: Install Rust stable + wasm32 target
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: wasm32-unknown-unknown

      - name: Restore Cargo cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: tessera-ts -> tessera-ts/target

      - name: Install wasm-pack
        # Pinned + checksummed (crates.io) install — NOT an unverified curl|sh of whatever the installer
        # endpoint currently serves. --locked builds with wasm-pack's own committed Cargo.lock.
        run: cargo install wasm-pack --version 0.15.0 --locked

      - name: Setup Node 24
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'

      # Build the sidecar binary from the public Rust core.
      # The binary path is $GITHUB_WORKSPACE/ciphera-tessera/target/release/tessera-sidecar
      - name: Build tessera-sidecar
        working-directory: ciphera-tessera
        run: cargo build --release --bin tessera-sidecar

      # wasm-pack writes two output trees:
      #   tessera-ts/packages/tessera-ts/wasm/web/
      #   tessera-ts/packages/tessera-ts/wasm/node/
      # The script is ROOT-relative (root = tessera-ts repo root).
      - name: Build WASM (web + node targets)
        working-directory: tessera-ts
        run: bash packages/tessera-ts/scripts/build-wasm.sh

      # Gate: node:test harness. Uses TESSERA_SIDECAR_BIN to locate the
      # freshly-built sidecar. No npm install needed — the harness file is
      # plain ESM with node:test imports only.
      - name: Run handshake gate
        working-directory: tessera-ts
        env:
          TESSERA_SIDECAR_BIN: ${{ github.workspace }}/ciphera-tessera/target/release/tessera-sidecar
        run: node --test harness/handshake/handshake.test.mjs

  # =========================================================================
  # JOB 3 — ts-tests   (needs: handshake-gate)
  # Full TypeScript test suite: unit tests, parity tests (TS↔Go), and vector
  # tests. The parity harnesses shell out to `go` against the tessera-go
  # sibling, so this job checks out all three repos.
  # =========================================================================
  ts-tests:
    needs: [handshake-gate]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tessera-ts
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          path: tessera-ts

      - name: Checkout ciphera-tessera (public)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: ciphera-net/tessera
          path: ciphera-tessera

      # tessera-go is required by the parity harness replace directives:
      #   harness/{vault,blindindex}-parity/go.mod:
      #     replace github.com/ciphera-net/tessera-go => ../../../tessera-go
      - name: Checkout tessera-go (public)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: ciphera-net/tessera-go
          path: tessera-go

      - name: Install Rust stable + wasm32 target
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: wasm32-unknown-unknown

      - name: Restore Cargo cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: tessera-ts -> tessera-ts/target

      - name: Install wasm-pack
        # Pinned + checksummed (crates.io) install — NOT an unverified curl|sh of whatever the installer
        # endpoint currently serves. --locked builds with wasm-pack's own committed Cargo.lock.
        run: cargo install wasm-pack --version 0.15.0 --locked

      - name: Setup Node 24
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: tessera-ts/packages/tessera-ts/package-lock.json

      - name: Setup Go 1.25
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.25'
          # go.mod files live under harness subdirs, not the workspace root;
          # pass one representative go.sum so setup-go can prime the module cache.
          cache-dependency-path: tessera-ts/harness/vault-parity/go.sum

      # Rebuild sidecar for the sidecar-backed vitest tests.
      - name: Build tessera-sidecar
        working-directory: ciphera-tessera
        run: cargo build --release --bin tessera-sidecar

      - name: Build WASM (web + node targets)
        working-directory: tessera-ts
        run: bash packages/tessera-ts/scripts/build-wasm.sh

      - name: npm ci
        working-directory: tessera-ts/packages/tessera-ts
        run: npm ci

      - name: npm audit (production deps)
        working-directory: tessera-ts/packages/tessera-ts
        run: npm audit --omit=dev

      # vitest covers:
      #   • packages/tessera-ts/src/**   (unit tests)
      #   • harness/vault-parity         (Go↔TS vault parity)
      #   • harness/blindindex-parity    (Go↔TS blind index parity)
      #   • test/vectors.test.ts         (canonical conformance vectors from the ciphera-tessera sibling)
      # The parity harnesses use TESSERA_SIDECAR_BIN and call `go run` against the tessera-go sibling
      # (replace directives above); the vectors test reads ciphera-tessera/conformance/vectors.
      - name: vitest run
        working-directory: tessera-ts/packages/tessera-ts
        env:
          TESSERA_SIDECAR_BIN: ${{ github.workspace }}/ciphera-tessera/target/release/tessera-sidecar
        run: npx vitest run

      - name: TypeScript type-check
        working-directory: tessera-ts/packages/tessera-ts
        run: npx tsc --noEmit

  # Real-browser matrix: web-target wasm + WebCrypto on Chromium + WebKit, plus the WebAuthn-PRF
  # ceremony via a CDP virtual authenticator (Chromium). Needs only the core sibling (for the wasm
  # path-dep build) — NOT the sidecar or tessera-go (the browser specs don't use them).
  browser:
    needs: [handshake-gate]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tessera-ts
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          path: tessera-ts

      - name: Checkout ciphera-tessera (public)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: ciphera-net/tessera
          path: ciphera-tessera

      - name: Install Rust stable + wasm32 target
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: wasm32-unknown-unknown

      - name: Restore Cargo cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: tessera-ts -> tessera-ts/target

      - name: Install wasm-pack
        # Pinned + checksummed (crates.io) install — NOT an unverified curl|sh of whatever the installer
        # endpoint currently serves. --locked builds with wasm-pack's own committed Cargo.lock.
        run: cargo install wasm-pack --version 0.15.0 --locked

      - name: Setup Node 24
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: tessera-ts/packages/tessera-ts/package-lock.json

      - name: Build WASM (web + node targets)
        working-directory: tessera-ts
        run: bash packages/tessera-ts/scripts/build-wasm.sh

      - name: npm ci
        working-directory: tessera-ts/packages/tessera-ts
        run: npm ci

      - name: Install Playwright browsers (Chromium + WebKit)
        working-directory: tessera-ts/packages/tessera-ts
        run: npx playwright install --with-deps chromium webkit

      # crypto.spec.ts (chromium+webkit): web-target wasm load + blind-index vectors + vault/vmk.
      # passkey-prf.spec.ts (chromium): real WebAuthn-PRF via CDP virtual authenticator — SKIPS with a
      # documented reason if this Chromium build's virtual authenticator does not surface PRF.
      - name: Playwright browser matrix
        working-directory: tessera-ts/packages/tessera-ts
        run: npx playwright test
